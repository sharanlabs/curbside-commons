# CI (plan v3.3 S3a — NEW-03): the committed gates, run on every push/PR.
# Hardening per plan §Gates: Node 24 pinned (repo engines >=24; native type-stripping),
# immutable action pins (full commit SHAs, resolved live from the upstream repos
# 2026-07-10), least permissions, per-ref concurrency, explicit timeout.
# NO claim edits ride this slice — the README's CI wording flips at S3b, strictly
# after this workflow's first green run is observed (plan order).
# e2e joins this workflow when the dual contracts land (S5, per plan).
name: CI

# Batch-A Codex P2 (accepted-fixed): unqualified push trigger per the plan's
# "on push/PR" — no branch filter; per-ref concurrency below de-duplicates.
on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run verify        # typecheck + lint + vitest suites + build
      - run: npm run test:legacy   # the archived legacy module's 306-test suite
